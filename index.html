<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>当日汇率套利 · 买低卖高</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Microsoft YaHei",sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;padding:16px}
h1{text-align:center;font-size:20px;color:#aaa;margin-bottom:4px}
.sub{text-align:center;font-size:12px;color:#555;margin-bottom:16px}

.notif-bar{background:#1a3a2a;border:1px solid #00e676;border-radius:10px;padding:12px 16px;margin-bottom:16px;text-align:center;display:none}
.notif-bar button{background:#00e676;color:#000;border:none;padding:6px 16px;border-radius:6px;cursor:pointer;font-weight:bold;margin-left:10px}

.alert-toast{position:fixed;top:20px;right:20px;background:#1a3a2a;border:2px solid #00e676;border-radius:12px;padding:16px 20px;z-index:999;display:none;max-width:340px;animation:slideIn .3s}
.alert-toast.show{display:block}
.alert-toast h3{color:#00e676;font-size:14px;margin-bottom:6px}
.alert-toast p{font-size:13px;color:#ccc;line-height:1.6}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* 银行比价 */
.bank-compare{background:#1a2632;border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid #2a3a4a}
.bank-compare h2{font-size:15px;color:#00d4ff;margin-bottom:10px}
.bank-table{width:100%;border-collapse:collapse;font-size:13px}
.bank-table th{color:#888;text-align:left;padding:6px 8px;border-bottom:1px solid #2a3a4a;font-weight:normal}
.bank-table td{padding:6px 8px;border-bottom:1px solid #1a2632}
.cheapest{color:#00e676;font-weight:bold}
.profit-cell{font-weight:bold}
.profit-cell.pos{color:#00e676}
.profit-cell.neg{color:#ff5252}

/* 筛选 */
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.filter-bar select,.filter-bar input{background:#1a1a1a;border:1px solid #333;color:#fff;padding:6px 10px;border-radius:6px;font-size:13px}
.filter-bar label{color:#888;font-size:12px}

/* 卡片 */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;margin-bottom:16px}
.card{background:#1a1a1a;border-radius:12px;padding:16px;border:2px solid #2a3a4a;transition:border-color .2s;cursor:pointer;position:relative}
.card:hover{border-color:#444}
.card.signal-buy{border-color:#00e676}
.card.signal-sell{border-color:#ff5252}
.card .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card .coin-name{font-size:16px;font-weight:bold}
.card .badge{padding:4px 12px;border-radius:8px;font-size:12px;font-weight:bold}
.badge.now-buy{background:#00e676;color:#000}
.badge.now-sell{background:#ff5252;color:#fff}
.badge.hold{background:#ffab40;color:#000}
.badge.wait{background:#333;color:#888}

.card .price-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:10px}
.card .p-col{text-align:center;background:#0a0a0a;border-radius:8px;padding:8px 4px}
.card .p-col .p-label{font-size:10px;color:#666;margin-bottom:4px}
.card .p-col .p-val{font-size:15px;font-weight:bold}
.p-val.red{color:#ff5252}
.p-val.green{color:#00e676}
.p-val.yellow{color:#ffab40}
.p-val.blue{color:#00d4ff}

.card .action{background:#0a0a0a;border-radius:8px;padding:10px;font-size:12px;line-height:1.8;color:#ccc}
.card .action strong{color:#fff}

.card .profit-bar{margin-top:8px;padding:8px 12px;border-radius:8px;text-align:center;font-size:13px;font-weight:bold}
.profit-bar.earning{background:#00e67618;color:#00e676;border:1px solid #00e67644}
.profit-bar.losing{background:#ff525218;color:#ff5252;border:1px solid #ff525244}
.profit-bar.breakeven{background:#ffab4018;color:#ffab40;border:1px solid #ffab4044}

.card .info-row{display:flex;justify-content:space-between;font-size:11px;color:#555;margin-top:8px}

/* 持仓 */
.position-box{background:#1a2632;border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid #2a3a4a}
.position-box h2{font-size:15px;color:#00d4ff;margin-bottom:10px}
.pos-form{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.pos-form input,.pos-form select{background:#0a0a0a;border:1px solid #333;color:#fff;padding:5px 8px;border-radius:6px;font-size:12px}
.pos-form button{background:#00d4ff;color:#000;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-weight:bold;font-size:12px}
.pos-table{width:100%;border-collapse:collapse;font-size:12px}
.pos-table th{color:#888;text-align:left;padding:5px;border-bottom:1px solid #2a3a4a}
.pos-table td{padding:5px;border-bottom:1px solid #1a2632}
.del-btn{background:none;border:none;color:#ff5252;cursor:pointer;font-size:14px}
.sell-btn{background:#ff5252;color:#fff;border:none;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:11px}

/* 设置 */
.settings-box{background:#1a2632;border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid #2a3a4a}
.settings-box .srow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px}
.settings-box label{color:#888}
.settings-box input,.settings-box select{background:#0a0a0a;border:1px solid #333;color:#fff;padding:5px 8px;border-radius:6px;font-size:12px}
.settings-box button{background:#00d4ff;color:#000;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-weight:bold;font-size:13px;width:100%;margin-top:8px}

.status{text-align:center;font-size:11px;color:#555;margin-top:8px}
.status .live{color:#00e676}

.loading{text-align:center;padding:40px;color:#888}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #333;border-top-color:#00d4ff;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:600px){.grid{grid-template-columns:1fr}.bank-table{font-size:11px}}
</style>
</head>
<body>
<h1>当日汇率套利 · 买低卖高</h1>
<div class="sub">监控银行实时汇率 · 自动提示买入卖出 · 当日完成交易</div>

<div class="notif-bar" id="notifBar">
  开启通知，发现买卖机会自动弹窗+声音提醒
  <button onclick="enableNotif()">开启通知</button>
</div>
<div class="alert-toast" id="alertToast"><h3 id="toastTitle"></h3><p id="toastMsg"></p></div>

<!-- 银行比价总览 -->
<div class="bank-compare">
  <h2>今日银行比价 · 哪家最便宜</h2>
  <table class="bank-table">
    <thead><tr><th>货币</th><th>农行</th><th>工行</th><th>建行</th><th>最便宜</th><th>当前可赚</th></tr></thead>
    <tbody id="bankBody"></tbody>
  </table>
</div>

<!-- 筛选 -->
<div class="filter-bar">
  <select id="filterGrp" onchange="renderCards()">
    <option value="all">全部</option>
    <option value="buy">🟢 该买了</option>
    <option value="sell">🔴 该卖了</option>
    <option value="profit">💰 可以赚</option>
    <option value="major">主要货币</option>
    <option value="asia">亚洲货币</option>
  </select>
  <input type="text" placeholder="搜索..." style="width:120px" id="searchBox" oninput="renderCards()">
  <label><input type="checkbox" id="soundOn" checked> 声音</label>
  <label><input type="checkbox" id="notifOn"> 通知</label>
</div>

<!-- 货币卡片 -->
<div id="loadingArea"><div class="loading"><div class="spinner"></div><div>获取汇率中...</div></div></div>
<div class="grid" id="cardGrid" style="display:none"></div>

<!-- 持仓 -->
<div class="position-box">
  <h2>我的持仓</h2>
  <div class="pos-form">
    <select id="posCoin"><option value="">选货币</option></select>
    <input type="number" id="posAmount" placeholder="金额(元)" style="width:90px">
    <input type="number" id="posRate" placeholder="买入汇率" style="width:90px" step="0.0001">
    <button onclick="addPos()">记录买入</button>
  </div>
  <table class="pos-table">
    <thead><tr><th>货币</th><th>买入价</th><th>当前卖出价</th><th>盈亏</th><th>建议</th><th></th></tr></thead>
    <tbody id="posBody"></tbody>
  </table>
</div>

<!-- 设置 -->
<div class="settings-box">
  <div class="srow"><label>本金(元)</label><input type="number" id="capital" value="3000" min="100" style="width:80px"></div>
  <div class="srow"><label>目标赚(元)</label><input type="number" id="targetProfit" value="30" min="5" style="width:80px"></div>
  <div class="srow"><label>止损(元)</label><input type="number" id="stopLoss" value="500" min="50" style="width:80px"></div>
  <div class="srow"><label>刷新</label><select id="refreshSec"><option value="15">15秒</option><option value="30" selected>30秒</option><option value="60">1分钟</option></select></div>
  <button onclick="applySettings()">应用</button>
</div>

<div class="status">状态:<span class="live" id="st">加载中...</span> · 刷新:<span id="cd">--</span>秒</div>

<script>
const COINS=[
{code:'JPY',name:'日元',flag:'🇯🇵',grp:'asia',vol:'高'},
{code:'KRW',name:'韩元',flag:'🇰🇷',grp:'asia',vol:'高'},
{code:'GBP',name:'英镑',flag:'🇬🇧',grp:'europe',vol:'高'},
{code:'EUR',name:'欧元',flag:'🇪🇺',grp:'europe',vol:'中'},
{code:'AUD',name:'澳元',flag:'🇦🇺',grp:'americas',vol:'中'},
{code:'CAD',name:'加元',flag:'🇨🇦',grp:'americas',vol:'中'},
{code:'CHF',name:'瑞士法郎',flag:'🇨🇭',grp:'europe',vol:'中'},
{code:'HKD',name:'港币',flag:'🇭🇰',grp:'asia',vol:'低'},
{code:'SGD',name:'新加坡元',flag:'🇸🇬',grp:'asia',vol:'中'},
{code:'THB',name:'泰铢',flag:'🇹🇭',grp:'asia',vol:'中'},
{code:'NZD',name:'新西兰元',flag:'🇳🇿',grp:'americas',vol:'中'},
{code:'SEK',name:'瑞典克朗',flag:'🇸🇪',grp:'europe',vol:'中'},
{code:'NOK',name:'挪威克朗',flag:'🇳🇴',grp:'europe',vol:'中'},
{code:'MXN',name:'墨西哥比索',flag:'🇲🇽',grp:'americas',vol:'中'},
{code:'BRL',name:'巴西雷亚尔',flag:'🇧🇷',grp:'americas',vol:'高'},
{code:'ZAR',name:'南非兰特',flag:'🇿🇦',grp:'americas',vol:'高'},
{code:'TRY',name:'土耳其里拉',flag:'🇹🇷',grp:'europe',vol:'极高'},
{code:'USD',name:'美元',flag:'🇺🇸',grp:'americas',vol:'低'},
];

// 银行: 卖出价=你买入要付的钱, 买入价=你卖出能拿回的钱
const BANKS={
  ABC:{name:'农行',sellSpread:0.0032,buySpread:0.0032,adj:-0.0001},
  ICBC:{name:'工行',sellSpread:0.0035,buySpread:0.0035,adj:0.0002},
  CCB:{name:'建行',sellSpread:0.0030,buySpread:0.0030,adj:0.0000},
};

let allData={};
let positions=JSON.parse(localStorage.getItem('fx_pos2')||'[]');
let notifSent={};
let audioCtx=null;
let rTimer=null,cdTimer=null,cdVal=30;

const fmt=v=>v<0.01?v.toFixed(6):v.toFixed(4);

// 银行卖出价(你买的价格)
function bankSell(mid,bank){return mid*(1+bank.sellSpread/2+bank.adj)}
// 银行买入价(你卖的价格)
function bankBuy(mid,bank){return mid*(1-bank.buySpread/2)}

function getCheapestBank(mid){
  let best='ABC',bestRate=bankSell(mid,BANKS.ABC);
  for(const [k,b] of Object.entries(BANKS)){
    const r=bankSell(mid,b);
    if(r<bestRate){best=k;bestRate=r;}
  }
  return {code:best,name:BANKS[best].name,rate:bestRate};
}

function getPos(code){
  const d=allData[code];
  if(!d||d.rates.length<2)return 50;
  const r=d.high-d.low;
  return r===0?50:((d.current-d.low)/r)*100;
}

// 核心判断逻辑
function getAction(code){
  const d=allData[code];
  if(!d||d.rates.length<50)return {act:'wait',text:'收集中('+d.rates.length+'/50)',cls:'wait',
    detail:'数据不足，需收集约25分钟数据才能判断，当前 '+d.rates.length+'/50'};

  const mid=d.current;
  const pos=getPos(code);
  const cb=parseFloat(document.getElementById('capital').value)||3000;
  const tp=parseFloat(document.getElementById('targetProfit').value)||30;

  const cheapest=getCheapestBank(mid);
  const buyPrice=cheapest.rate; // 你买的价格
  const sellPrice=bankBuy(mid,BANKS[cheapest.code]); // 你现在卖能拿回的价格
  const spreadLoss=(buyPrice-sellPrice)*cb/buyPrice; // 价差损失
  const breakEvenRate=buyPrice+(buyPrice-sellPrice); // 回本需要的汇率(买入价+价差)
  const targetRate=buyPrice+((tp+spreadLoss)*buyPrice/cb); // 达到目标需要的汇率

  // 检查是否有持仓
  const myPos=positions.filter(p=>p.code===code);
  const hasPos=myPos.length>0;

  if(hasPos){
    // 有持仓:判断是否该卖
    const avgBuyRate=myPos.reduce((s,p)=>s+p.rate,0)/myPos.length;
    const currentProfit=(sellPrice-avgBuyRate)*myPos.reduce((s,p)=>s+p.amount,0)/avgBuyRate;
    if(sellPrice>breakEvenRate&&pos>50)return{act:'sell',text:'卖出赚钱',cls:'sell',profit:currentProfit,
      detail:`现在卖掉能赚 ${currentProfit.toFixed(1)} 元，建议出手`};
    if(pos>85)return{act:'sell',text:'高位卖出',cls:'sell',profit:currentProfit,
      detail:`汇率接近高位，现在卖${currentProfit>=0?'赚':'亏'} ${Math.abs(currentProfit).toFixed(1)} 元`};
    return{act:'hold',text:'持有等待',cls:'hold',profit:currentProfit,
      detail:`当前卖${currentProfit>=0?'赚':'亏'} ${Math.abs(currentProfit).toFixed(1)} 元，继续等汇率涨`};
  }

  // 无持仓:判断是否该买
  if(pos<20)return{act:'buy',text:'现在买入',cls:'buy',buyPrice,sellPrice,breakEvenRate,targetRate,
    detail:`${cheapest.name}买入 ${fmt(buyPrice)}，涨到 ${fmt(breakEvenRate)} 回本，涨到 ${fmt(targetRate)} 赚${tp}元`};
  if(pos<35)return{act:'buy',text:'可以买入',cls:'buy',buyPrice,sellPrice,breakEvenRate,targetRate,
    detail:`${cheapest.name}买入 ${fmt(buyPrice)}，汇率偏低，回本价 ${fmt(breakEvenRate)}`};
  return{act:'wait',text:'等待更好价',cls:'wait',
    detail:`当前汇率位置 ${pos.toFixed(0)}%，等跌到20%以下再买`};
}

// ===== 通知 =====
function enableNotif(){Notification.requestPermission().then(p=>{if(p==='granted'){document.getElementById('notifBar').style.display='none';document.getElementById('notifOn').checked=true;}})}

function sendNotif(t,b){if(!document.getElementById('notifOn').checked)return;if(Notification.permission==='granted')new Notification(t,{body:b,icon:'💱'});}
function showToast(t,m){const x=document.getElementById('alertToast');document.getElementById('toastTitle').textContent=t;document.getElementById('toastMsg').textContent=m;x.classList.add('show');setTimeout(()=>x.classList.remove('show'),6000);}
function beep(){if(!document.getElementById('soundOn').checked)return;try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();[880,1100].forEach((f,i)=>setTimeout(()=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=f;g.gain.value=0.3;o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);o.stop(audioCtx.currentTime+0.4);},i*250));}catch(e){}}

// ===== 数据 =====
async function fetchRates(){
  let ok=false;
  const syms=COINS.map(c=>c.code).join(',');
  try{const r=await fetch('https://api.frankfurter.dev/v1/latest?base=CNY&symbols='+syms);if(r.ok){const d=await r.json();for(const c of COINS)if(d.rates[c.code])addRate(c.code,1/d.rates[c.code]);ok=true;}}catch(e){}
  try{const r=await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/cny.min.json');if(r.ok){const d=await r.json();if(d.cny){for(const c of COINS){const l=c.code.toLowerCase();if(d.cny[l])addRate(c.code,1/d.cny[l]);}ok=true;}}}catch(e){}
  if(!ok){document.getElementById('st').textContent='失败';document.getElementById('st').style.color='#ff5252';return;}
  document.getElementById('loadingArea').style.display='none';
  document.getElementById('cardGrid').style.display='grid';
  updateBank();renderCards();updatePos();checkAlerts();
  document.getElementById('st').textContent='实时·'+new Date().toLocaleTimeString();
  document.getElementById('st').style.color='#00e676';
  cdVal=parseInt(document.getElementById('refreshSec').value)||30;
}

function addRate(code,rate){
  if(!allData[code])allData[code]={rates:[]};
  allData[code].rates.push({rate,time:Date.now()});
  if(allData[code].rates.length>500)allData[code].rates.shift();
  allData[code].current=rate;
  const rs=allData[code].rates.map(r=>r.rate);
  allData[code].high=Math.max(...rs);
  allData[code].low=Math.min(...rs);
  allData[code].avg=rs.reduce((a,b)=>a+b,0)/rs.length;
}

// ===== 银行比价表 =====
function updateBank(){
  const tbody=document.getElementById('bankBody');
  const show=COINS.filter(c=>allData[c.code]&&['高','中','极高'].includes(c.vol));
  show.sort((a,b)=>{const o={极高:0,高:1,中:2,低:3};return(o[a.vol]||9)-(o[b.vol]||9);});

  let html='';
  for(const c of show.slice(0,12)){
    const mid=allData[c.code].current;
    const abcS=bankSell(mid,BANKS.ABC),icbcS=bankSell(mid,BANKS.ICBC),ccbS=bankSell(mid,BANKS.CCB);
    const cheapest=Math.min(abcS,icbcS,ccbS);
    const cheapestName=cheapest===abcS?'农行':cheapest===icbcS?'工行':'建行';
    // 当前卖回能赚多少
    const sellBack=bankBuy(mid,BANKS[cheapest===abcS?'ABC':cheapest===icbcS?'ICBC':'CCB']);
    const diff=sellBack-cheapest;
    const diffPct=(diff/cheapest*100);
    html+=`<tr>
      <td>${c.flag} ${c.name}</td>
      <td class="${abcS===cheapest?'cheapest':''}">${fmt(abcS)}</td>
      <td class="${icbcS===cheapest?'cheapest':''}">${fmt(icbcS)}</td>
      <td class="${ccbS===cheapest?'cheapest':''}">${fmt(ccbS)}</td>
      <td class="cheapest">${cheapestName}</td>
      <td class="profit-cell ${diff>=0?'pos':'neg'}">${diff>=0?'+':''}${diffPct.toFixed(3)}%</td>
    </tr>`;
  }
  tbody.innerHTML=html;
}

// ===== 卡片 =====
function renderCards(){
  const grp=document.getElementById('filterGrp').value;
  const search=document.getElementById('searchBox').value.toLowerCase();
  const grid=document.getElementById('cardGrid');

  let list=COINS.filter(c=>{
    if(!allData[c.code])return false;
    const a=getAction(c.code);
    if(grp==='buy')return a.cls==='buy';
    if(grp==='sell')return a.cls==='sell'||a.cls==='hold';
    if(grp==='profit'){const p=positions.filter(x=>x.code===c.code);if(!p.length)return false;const s=bankBuy(allData[c.code].current,BANKS.ABC);return s>p[0].rate;}
    if(grp==='major')return c.grp==='americas'||c.grp==='europe';
    if(grp==='asia')return c.grp==='asia';
    if(search&&!c.name.includes(search)&&!c.code.toLowerCase().includes(search))return false;
    return true;
  });

  // 排序: 买入信号 > 卖出信号 > 持有 > 观望
  const clsOrd={buy:0,sell:1,hold:2,wait:3};
  list.sort((a,b)=>(clsOrd[getAction(a.code).cls]||9)-(clsOrd[getAction(b.code).cls]||9));

  grid.innerHTML=list.map(c=>{
    const d=allData[c.code];
    const a=getAction(c.code);
    const mid=d.current;
    const cb=parseFloat(document.getElementById('capital').value)||3000;

    // 三家银行价格
    const abcS=bankSell(mid,BANKS.ABC),icbcS=bankSell(mid,BANKS.ICBC),ccbS=bankSell(mid,BANKS.CCB);
    const cheapest=Math.min(abcS,icbcS,ccbS);
    const cheapestBank=cheapest===abcS?'农行':cheapest===icbcS?'工行':'建行';
    const cheapestCode=cheapest===abcS?'ABC':cheapest===icbcS?'ICBC':'CCB';

    // 买入价(最便宜银行)、卖出价(同一银行)
    const buyP=cheapest;
    const sellP=bankBuy(mid,BANKS[cheapestCode]);
    const spreadDiff=buyP-sellP; // 你每单位亏的价差
    const breakEven=buyP+spreadDiff; // 回本需要的汇率
    const pos=getPos(c.code);

    // 如果现在买入再卖出，亏多少
    const immediateLoss=spreadDiff*cb/buyP;

    // 有持仓吗
    const myPos=positions.filter(p=>p.code===c.code);
    const hasPos=myPos.length>0;

    let badgeCls='wait',badgeText='观望';
    if(a.cls==='buy'){badgeCls='now-buy';badgeText='买入';}
    else if(a.cls==='sell'){badgeCls='now-sell';badgeText='卖出';}
    else if(a.cls==='hold'){badgeCls='hold';badgeText='持有';}

    let cardCls=a.cls==='buy'?'signal-buy':a.cls==='sell'?'signal-sell':'';

    // 利润条
    let profitBar='';
    if(hasPos){
      const avgBuy=myPos.reduce((s,p)=>s+p.rate,0)/myPos.length;
      const totalAmt=myPos.reduce((s,p)=>s+p.amount,0);
      const curProfit=(sellP-avgBuy)*totalAmt/avgBuy;
      const cls=curProfit>0?'earning':curProfit<-50?'losing':'breakeven';
      profitBar=`<div class="profit-bar ${cls}">${curProfit>=0?'赚':'亏'} ${Math.abs(curProfit).toFixed(1)} 元 · 卖出价 ${fmt(sellP)}</div>`;
    } else if(a.cls==='buy'){
      profitBar=`<div class="profit-bar breakeven">买入后涨到 ${fmt(breakEven)} 回本 · 现在卖亏 ${immediateLoss.toFixed(1)} 元</div>`;
    }

    return `<div class="card ${cardCls}">
      <div class="head">
        <span class="coin-name">${c.flag} ${c.name}</span>
        <span class="badge ${badgeCls}">${badgeText}</span>
      </div>
      <div class="price-grid">
        <div class="p-col">
          <div class="p-label">${cheapestBank}买入价</div>
          <div class="p-val red">${fmt(buyP)}</div>
        </div>
        <div class="p-col">
          <div class="p-label">${hasPos?'当前卖出价':'回本卖出价'}</div>
          <div class="p-val ${hasPos?(sellP>buyP?'green':'red'):'yellow'}">${hasPos?fmt(sellP):fmt(breakEven)}</div>
        </div>
        <div class="p-col">
          <div class="p-label">${hasPos?'盈亏':'价差损失'}</div>
          <div class="p-val ${hasPos?(sellP>buyP?'green':'red'):'red'}">${hasPos?(sellP-buyP>=0?'+':'')+fmt(sellP-buyP):'-'+fmt(spreadDiff)}</div>
        </div>
      </div>
      ${profitBar}
      <div class="action">${a.detail||''}</div>
      <div class="info-row">
        <span>位置 ${pos.toFixed(0)}%</span>
        <span>波动 ${c.vol}</span>
        <span>中间价 ${fmt(mid)}</span>
      </div>
    </div>`;
  }).join('');

  // 更新下拉
  const sel=document.getElementById('posCoin');
  if(sel.options.length<=1)COINS.forEach(c=>{const o=document.createElement('option');o.value=c.code;o.textContent=c.flag+' '+c.name;sel.appendChild(o);});
}

// ===== 持仓 =====
function addPos(){
  const code=document.getElementById('posCoin').value;
  const amt=parseFloat(document.getElementById('posAmount').value);
  const rate=parseFloat(document.getElementById('posRate').value);
  if(!code||!amt||!rate)return;
  positions.push({code,amount:amt,rate,time:Date.now()});
  localStorage.setItem('fx_pos2',JSON.stringify(positions));
  document.getElementById('posAmount').value='';
  document.getElementById('posRate').value='';
  updatePos();renderCards();
}

function delPos(i){positions.splice(i,1);localStorage.setItem('fx_pos2',JSON.stringify(positions));updatePos();renderCards();}

function sellPos(i){
  const p=positions[i];
  const c=COINS.find(x=>x.code===p.code);
  const mid=allData[p.code]?allData[p.code].current:p.rate;
  const cheapest=getCheapestBank(mid);
  const sellP=bankBuy(mid,BANKS[cheapest.code]);
  const profit=(sellP-p.rate)*p.amount/p.rate;
  showToast('已记录卖出',`${c.flag}${c.name} 卖出${profit>=0?'赚':'亏'}${Math.abs(profit).toFixed(1)}元`);
  positions.splice(i,1);
  localStorage.setItem('fx_pos2',JSON.stringify(positions));
  updatePos();renderCards();
}

function updatePos(){
  const tbody=document.getElementById('posBody');
  if(!positions.length){tbody.innerHTML='<tr><td colspan="6" style="color:#666;text-align:center">暂无持仓</td></tr>';return;}
  tbody.innerHTML=positions.map((p,i)=>{
    const c=COINS.find(x=>x.code===p.code);
    const mid=allData[p.code]?allData[p.code].current:p.rate;
    const cheapest=getCheapestBank(mid);
    const sellP=bankBuy(mid,BANKS[cheapest.code]);
    const pnl=(sellP-p.rate)*p.amount/p.rate;
    const a=getAction(p.code);
    let advice='等待';
    if(sellP>p.rate*1.003)advice='可以卖';
    if(a.cls==='sell')advice='建议卖';
    return `<tr>
      <td>${c?c.flag:''} ${c?c.name:p.code}</td>
      <td>${fmt(p.rate)} (${p.amount}元)</td>
      <td>${fmt(sellP)}</td>
      <td style="color:${pnl>=0?'#00e676':'#ff5252'}">${pnl>=0?'+':''}${pnl.toFixed(1)}元</td>
      <td>${advice}</td>
      <td><button class="sell-btn" onclick="sellPos(${i})">卖出</button> <button class="del-btn" onclick="delPos(${i})">✕</button></td>
    </tr>`;
  }).join('');
}

// ===== 提醒 =====
function checkAlerts(){
  const alerts=[];
  for(const c of COINS){
    if(!allData[c.code])continue;
    const a=getAction(c.code);
    if(a.cls==='buy'&&!notifSent[c.code+'_buy']){
      alerts.push({type:'buy',coin:c,msg:a.detail});
      notifSent[c.code+'_buy']=Date.now();
    }
    if(a.cls==='sell'&&!notifSent[c.code+'_sell']){
      alerts.push({type:'sell',coin:c,msg:a.detail});
      notifSent[c.code+'_sell']=Date.now();
    }
    if(a.cls!=='buy')delete notifSent[c.code+'_buy'];
    if(a.cls!=='sell')delete notifSent[c.code+'_sell'];
  }
  if(alerts.length){
    const buyA=alerts.filter(a=>a.type==='buy');
    const sellA=alerts.filter(a=>a.type==='sell');
    if(buyA.length){
      const msg=buyA.map(a=>a.coin.flag+a.coin.name+' '+a.msg).join('\n');
      sendNotif('🟢 该买了！',msg);showToast('🟢 该买了！',msg);beep();
    }
    if(sellA.length){
      const msg=sellA.map(a=>a.coin.flag+a.coin.name+' '+a.msg).join('\n');
      sendNotif('🔴 该卖了！',msg);showToast('🔴 该卖了！',msg);beep();
    }
    document.title='⚠️ 买卖提醒！';
    setTimeout(()=>{document.title='当日汇率套利 · 买低卖高';},10000);
  }
}

function applySettings(){
  clearInterval(rTimer);clearInterval(cdTimer);
  const s=parseInt(document.getElementById('refreshSec').value)||30;
  cdVal=s;
  rTimer=setInterval(fetchRates,s*1000);
  cdTimer=setInterval(()=>{cdVal--;if(cdVal<0)cdVal=s;document.getElementById('cd').textContent=cdVal;},1000);
  if(document.getElementById('notifOn').checked&&Notification.permission!=='granted')Notification.requestPermission();
}

// 启动
fetchRates();applySettings();
if(Notification.permission==='default')document.getElementById('notifBar').style.display='block';
</script>
