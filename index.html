<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高波动货币买卖提示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        h1 { text-align: center; font-size: 22px; color: #aaa; margin-bottom: 20px; }

        .tab-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 10px 20px;
            border-radius: 10px;
            background: #1a1a1a;
            border: 2px solid #333;
            cursor: pointer;
            font-size: 15px;
            text-align: center;
            transition: all 0.2s;
            min-width: 120px;
        }
        .tab:hover { border-color: #00d4ff; }
        .tab.active { border-color: #00d4ff; background: #00d4ff22; }
        .tab .flag { font-size: 24px; }
        .tab .name { font-size: 13px; color: #aaa; margin-top: 2px; }
        .tab .signal { font-size: 12px; margin-top: 4px; font-weight: bold; }

        .main-panel {
            max-width: 500px;
            margin: 0 auto;
        }

        .rate-display {
            text-align: center;
            margin-bottom: 24px;
        }
        .rate-display .pair { font-size: 18px; color: #888; margin-bottom: 8px; }
        .rate-display .rate { font-size: 64px; font-weight: bold; }
        .rate-display .rate.low { color: #00e676; }
        .rate-display .rate.high { color: #ff5252; }
        .rate-display .rate.mid { color: #ffab40; }
        .rate-display .sub { font-size: 13px; color: #666; margin-top: 6px; }

        .verdict {
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 24px;
            font-size: 22px;
            font-weight: bold;
        }
        .verdict.buy { background: #00e67618; border: 2px solid #00e676; color: #00e676; }
        .verdict.sell { background: #ff525218; border: 2px solid #ff5252; color: #ff5252; }
        .verdict.wait { background: #ffab4018; border: 2px solid #ffab40; color: #ffab40; }
        .verdict .emoji { font-size: 40px; display: block; margin-bottom: 8px; }

        .explain {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.8;
            color: #ccc;
        }

        .profit-box {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .profit-box h3 { font-size: 14px; color: #00d4ff; margin-bottom: 10px; }
        .row-line {
            display: flex;
            justify-content: space-between;
            padding: 7px 0;
            border-bottom: 1px solid #222;
            font-size: 13px;
        }
        .row-line:last-child { border-bottom: none; }
        .row-line .lbl { color: #888; }
        .row-line .val { font-weight: bold; }
        .green { color: #00e676; }
        .red { color: #ff5252; }

        .chart-box {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .chart-box h3 { font-size: 14px; color: #00d4ff; margin-bottom: 10px; }
        canvas { width: 100%; height: 120px; }
        .chart-info { font-size: 11px; color: #666; text-align: center; margin-top: 6px; }

        .data-box {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .data-box h3 { font-size: 14px; color: #00d4ff; margin-bottom: 10px; }

        .settings-box {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .settings-box .srow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 13px;
        }
        .settings-box label { color: #888; }
        .settings-box input, .settings-box select {
            background: #0a0a0a;
            border: 1px solid #333;
            color: #fff;
            padding: 5px 8px;
            border-radius: 6px;
            font-size: 13px;
        }
        .settings-box button {
            background: #00d4ff;
            color: #000;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            width: 100%;
            margin-top: 8px;
        }

        .status-bar {
            text-align: center;
            font-size: 11px;
            color: #555;
            margin-top: 10px;
        }
        .status-bar .live { color: #00e676; }

        .loading { text-align: center; padding: 60px; color: #888; }
        .spinner {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3px solid #333;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>高波动货币 · 买卖提示</h1>

    <div class="tab-bar" id="tabBar"></div>

    <div id="loadingArea">
        <div class="loading">
            <div class="spinner"></div>
            <div>正在获取汇率数据...</div>
        </div>
    </div>

    <div class="main-panel" id="mainArea" style="display:none">
        <div class="rate-display">
            <div class="pair" id="pairName">--</div>
            <div class="rate" id="currentRate">--</div>
            <div class="sub" id="rateTime">--</div>
        </div>
        <div class="verdict wait" id="verdictBox">
            <span class="emoji" id="verdictEmoji">⏳</span>
            <div id="verdictText">加载中...</div>
        </div>
        <div class="explain" id="explainBox"></div>
        <div class="profit-box">
            <h3>买入计算（本金 <span id="capLabel">3000</span> 元）</h3>
            <div id="profitRows"></div>
        </div>
        <div class="chart-box">
            <h3>汇率走势</h3>
            <canvas id="chartCanvas"></canvas>
            <div class="chart-info" id="chartInfo"></div>
        </div>
        <div class="data-box">
            <h3>关键数据</h3>
            <div id="keyData"></div>
        </div>
        <div class="settings-box">
            <div class="srow">
                <label>本金(元)</label>
                <input type="number" id="capital" value="3000" min="100" style="width:80px">
            </div>
            <div class="srow">
                <label>目标赚(元)</label>
                <input type="number" id="targetProfit" value="50" min="10" style="width:80px">
            </div>
            <div class="srow">
                <label>止损亏(元)</label>
                <input type="number" id="stopLoss" value="500" min="50" style="width:80px">
            </div>
            <div class="srow">
                <label>刷新间隔</label>
                <select id="refreshSec">
                    <option value="15">15秒</option>
                    <option value="30" selected>30秒</option>
                    <option value="60">1分钟</option>
                </select>
            </div>
            <button onclick="applySettings()">应用设置</button>
        </div>
    </div>

    <div class="status-bar">
        状态: <span class="live" id="statusText">加载中...</span> ·
        下次刷新: <span id="countdown">--</span>秒
    </div>

<script>
// 高波动货币配置
const COINS = [
    { code: 'JPY', name: '日元', flag: '🇯🇵', note: '波动最大' },
    { code: 'GBP', name: '英镑', flag: '🇬🇧', note: '波动大' },
    { code: 'KRW', name: '韩元', flag: '🇰🇷', note: '波动较大' },
    { code: 'AUD', name: '澳元', flag: '🇦🇺', note: '波动中等' },
    { code: 'EUR', name: '欧元', flag: '🇪🇺', note: '波动中等' },
];

let selectedCoin = 'JPY';
let allData = {};        // { code: { rates: [{rate,time}], current, high, low, avg } }
let refreshTimer = null;
let countdownTimer = null;
let countdownVal = 30;

// 初始化标签栏
function initTabs() {
    const bar = document.getElementById('tabBar');
    bar.innerHTML = COINS.map(c => `
        <div class="tab ${c.code === selectedCoin ? 'active' : ''}" onclick="switchCoin('${c.code}')">
            <div class="flag">${c.flag}</div>
            <div class="name">${c.name} (${c.code})</div>
            <div class="signal" id="sig_${c.code}">--</div>
        </div>
    `).join('');
}

async function fetchRates() {
    let ok = false;

    // API 1
    const symbols = COINS.map(c => c.code).join(',');
    try {
        const r = await fetch('https://api.frankfurter.dev/v1/latest?base=CNY&symbols=' + symbols);
        if (r.ok) {
            const d = await r.json();
            for (const c of COINS) {
                if (d.rates[c.code]) {
                    const rate = 1 / d.rates[c.code]; // 1外币=?CNY
                    addRate(c.code, rate);
                }
            }
            ok = true;
        }
    } catch(e) {}

    // API 2 备用
    try {
        const r2 = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/cny.min.json');
        if (r2.ok) {
            const d2 = await r2.json();
            if (d2.cny) {
                for (const c of COINS) {
                    const lc = c.code.toLowerCase();
                    if (d2.cny[lc]) {
                        addRate(c.code, 1 / d2.cny[lc]);
                    }
                }
                ok = true;
            }
        }
    } catch(e) {}

    if (!ok) {
        document.getElementById('statusText').textContent = '获取失败,重试中...';
        document.getElementById('statusText').style.color = '#ff5252';
        return;
    }

    // 更新标签上的信号
    for (const c of COINS) {
        updateTabSignal(c.code);
    }

    document.getElementById('loadingArea').style.display = 'none';
    document.getElementById('mainArea').style.display = 'block';
    render();
    document.getElementById('statusText').textContent = '实时 · ' + new Date().toLocaleTimeString();
    document.getElementById('statusText').style.color = '#00e676';
    countdownVal = parseInt(document.getElementById('refreshSec').value) || 30;
}

function addRate(code, rate) {
    if (!allData[code]) allData[code] = { rates: [] };
    allData[code].rates.push({ rate, time: Date.now() });
    if (allData[code].rates.length > 300) allData[code].rates.shift();
    allData[code].current = rate;

    const rs = allData[code].rates.map(r => r.rate);
    allData[code].high = Math.max(...rs);
    allData[code].low = Math.min(...rs);
    allData[code].avg = rs.reduce((a, b) => a + b, 0) / rs.length;
}

function getPosition(code) {
    const d = allData[code];
    if (!d || d.rates.length < 2) return 50;
    const range = d.high - d.low;
    if (range === 0) return 50;
    return ((d.current - d.low) / range) * 100;
}

function getSignal(code) {
    const pos = getPosition(code);
    const d = allData[code];
    if (!d || d.rates.length < 3) return { text: '收集中', emoji: '⏳', cls: 'wait' };
    if (pos < 20) return { text: '买', emoji: '🟢', cls: 'buy' };
    if (pos > 80) return { text: '别买', emoji: '🔴', cls: 'sell' };
    return { text: '观望', emoji: '🟡', cls: 'wait' };
}

function updateTabSignal(code) {
    const el = document.getElementById('sig_' + code);
    if (!el) return;
    const sig = getSignal(code);
    el.textContent = sig.emoji + ' ' + sig.text;
    el.style.color = sig.cls === 'buy' ? '#00e676' : sig.cls === 'sell' ? '#ff5252' : '#ffab40';
}

function switchCoin(code) {
    selectedCoin = code;
    initTabs();
    render();
}

function render() {
    const d = allData[selectedCoin];
    if (!d) return;
    const info = COINS.find(c => c.code === selectedCoin);
    const capital = parseFloat(document.getElementById('capital').value) || 3000;
    const targetProfit = parseFloat(document.getElementById('targetProfit').value) || 50;
    const stopLoss = parseFloat(document.getElementById('stopLoss').value) || 500;
    document.getElementById('capLabel').textContent = capital;

    // 汇率显示格式
    const fmt = (r) => {
        if (r < 0.01) return r.toFixed(6);
        if (r < 1) return r.toFixed(4);
        return r.toFixed(4);
    };

    const pos = getPosition(selectedCoin);
    const sig = getSignal(selectedCoin);

    // 顶部
    document.getElementById('pairName').textContent = `${info.flag} 1 ${info.name} = ? 人民币`;
    const rateEl = document.getElementById('currentRate');
    rateEl.textContent = fmt(d.current) + ' ¥';
    rateEl.className = 'rate ' + (pos < 20 ? 'low' : pos > 80 ? 'high' : 'mid');
    document.getElementById('rateTime').textContent = `数据点: ${d.rates.length} · ${info.note}`;

    // 买卖提示
    const vbox = document.getElementById('verdictBox');
    vbox.className = 'verdict ' + sig.cls;
    document.getElementById('verdictEmoji').textContent = sig.emoji;
    let verdictText = '';
    let explain = '';
    if (sig.cls === 'buy') {
        verdictText = `现在买入${info.name}！`;
        explain = `${info.name}汇率 ${fmt(d.current)} 接近近期最低 ${fmt(d.low)}，处于底部 ${pos.toFixed(0)}%。现在用人民币买${info.name}，等涨上去再换回人民币赚钱。`;
    } else if (sig.cls === 'sell') {
        verdictText = `现在不要买${info.name}！`;
        explain = `${info.name}汇率 ${fmt(d.current)} 接近近期最高 ${fmt(d.high)}，处于顶部 ${pos.toFixed(0)}%。现在买太贵了，等汇率降下来再说。如果你之前买了，现在是卖出的好时机。`;
    } else {
        verdictText = `${info.name}价格一般，观望`;
        explain = `${info.name}汇率 ${fmt(d.current)} 处于中间位置 ${pos.toFixed(0)}%。近期在 ${fmt(d.low)} ~ ${fmt(d.high)} 之间波动，建议继续等更好的价格。`;
    }
    document.getElementById('verdictText').textContent = verdictText;
    document.getElementById('explainBox').textContent = explain;

    // 收益计算
    const canBuy = capital / d.current;
    const targetRate = capital / (canBuy - targetProfit / d.current);
    const stopRate = capital / (canBuy + stopLoss / d.current);
    const targetPct = ((targetRate - d.current) / d.current * 100);
    const stopPct = ((stopRate - d.current) / d.current * 100);

    document.getElementById('profitRows').innerHTML = `
        <div class="row-line"><span class="lbl">本金</span><span class="val">${capital} 元</span></div>
        <div class="row-line"><span class="lbl">现在能买</span><span class="val">${fmt(canBuy)} ${info.name}</span></div>
        <div class="row-line"><span class="lbl">赚${targetProfit}元需涨到</span><span class="val green">${fmt(targetRate)} ¥ (+${targetPct.toFixed(2)}%)</span></div>
        <div class="row-line"><span class="lbl">亏${stopLoss}元会跌到</span><span class="val red">${fmt(stopRate)} ¥ (${stopPct.toFixed(2)}%)</span></div>
    `;

    // 关键数据
    const range = d.high - d.low;
    document.getElementById('keyData').innerHTML = `
        <div class="row-line"><span class="lbl">近期最高</span><span class="val red">${fmt(d.high)} ¥</span></div>
        <div class="row-line"><span class="lbl">近期最低</span><span class="val green">${fmt(d.low)} ¥</span></div>
        <div class="row-line"><span class="lbl">均价</span><span class="val">${fmt(d.avg)} ¥</span></div>
        <div class="row-line"><span class="lbl">波动幅度</span><span class="val">${fmt(range)} ¥ (${(range/d.avg*100).toFixed(2)}%)</span></div>
        <div class="row-line"><span class="lbl">当前位置</span><span class="val">${pos.toFixed(0)}%（越低越便宜）</span></div>
    `;

    drawChart(d);
}

function drawChart(d) {
    const canvas = document.getElementById('chartCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width = canvas.offsetWidth * 2;
    const H = canvas.height = 240;
    ctx.clearRect(0, 0, W, H);

    if (d.rates.length < 2) return;

    const rs = d.rates.map(r => r.rate);
    const min = Math.min(...rs) * 0.999;
    const max = Math.max(...rs) * 1.001;
    const range = max - min || 0.001;
    const padX = 30, padY = 20;
    const cW = W - padX * 2, cH = H - padY * 2;

    // 网格
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
        const y = padY + (cH / 4) * i;
        ctx.beginPath(); ctx.moveTo(padX, y); ctx.lineTo(W - padX, y); ctx.stroke();
    }

    // 折线
    ctx.strokeStyle = '#00d4ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < rs.length; i++) {
        const x = padX + (i / (rs.length - 1)) * cW;
        const y = padY + cH - ((rs[i] - min) / range) * cH;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();

    // 当前点
    const lx = padX + cW;
    const ly = padY + cH - ((rs[rs.length - 1] - min) / range) * cH;
    ctx.fillStyle = '#00d4ff';
    ctx.beginPath(); ctx.arc(lx, ly, 4, 0, Math.PI * 2); ctx.fill();

    // 高低标注
    ctx.font = '18px sans-serif';
    const mi = rs.indexOf(Math.max(...rs));
    const xi = rs.indexOf(Math.min(...rs));
    ctx.fillStyle = '#ff5252';
    ctx.fillText('高 ' + rs[mi].toFixed(4), padX + (mi / (rs.length - 1)) * cW - 30, padY + cH - ((rs[mi] - min) / range) * cH - 8);
    ctx.fillStyle = '#00e676';
    ctx.fillText('低 ' + rs[xi].toFixed(4), padX + (xi / (rs.length - 1)) * cW - 30, padY + cH - ((rs[xi] - min) / range) * cH + 22);

    document.getElementById('chartInfo').textContent = `${rs.length} 个数据 · 最高: ${max.toFixed(4)} · 最低: ${min.toFixed(4)}`;
}

function applySettings() {
    clearInterval(refreshTimer);
    clearInterval(countdownTimer);
    const sec = parseInt(document.getElementById('refreshSec').value) || 30;
    countdownVal = sec;
    refreshTimer = setInterval(fetchRates, sec * 1000);
    countdownTimer = setInterval(() => {
        countdownVal--;
        if (countdownVal < 0) countdownVal = sec;
        document.getElementById('countdown').textContent = countdownVal;
    }, 1000);
}

initTabs();
fetchRates();
applySettings();
</script>
</body>
</html>
